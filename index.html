<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>狼人殺第一天法官</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div id="screen-start" class="screen">
            <h1>🐺 狼人殺 第一天法官</h1>
            <div class="game-settings">
                <label>
                    遊戲人數：
                    <select id="setting-player-count">
                        <option value="6">6 人局</option>
                        <option value="7">7 人局</option>
                        <option value="8">8 人局</option>
                        <option value="9">9 人局</option>
                        <option value="10">10 人局</option>
                        <option value="12" selected>12 人局</option>
                    </select>
                </label>
                <label>
                    板子選擇：
                    <select id="setting-board"></select>
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="setting-witch-rule">
                    第一天女巫可自救
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="setting-sheriff" checked>
                    包含上警環節 (競選警長)
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="setting-random-role">
                    系統隨機分配職業 (玩家輪流查看)
                </label>
            </div>
            <button id="btn-go-setup" class="primary-btn">下一步：錄入身分</button>
        </div>

        <div id="screen-setup" class="screen hidden">
            <h2>📝 錄入玩家身分</h2>
            <p style="color: #a2a8d3; font-size: 14px; margin-bottom: 15px;">點擊號碼牌設定身分，設定後將自動屏蔽隱藏。進入黑夜前系統會校驗配置是否正確。</p>
            <div id="role-setup-grid" class="grid-container"></div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button id="btn-back-start" class="text-btn">返回</button>
                <button id="btn-start-night" class="primary-btn">確認配置並進入黑夜</button>
            </div>
        </div>

        <div id="screen-night" class="screen hidden">
            <h2 id="night-role-title">角色名稱</h2>
            <p id="night-instruction" style="color: #a2a8d3;">請依照語音指示行動...</p>

            <div id="number-pad" class="grid-container hidden"></div>

            <div id="action-pad" class="hidden" style="display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; margin-top:15px; width:100%;"></div>

            <button id="btn-optional-skip" class="secondary-btn hidden" style="margin-top: 10px;">跳過</button>
            <button id="btn-confirm-action" class="primary-btn hidden" style="margin-top: 20px;">確認</button>
        </div>

        <div id="screen-sheriff" class="screen hidden">
            <h2>📢 上警環節</h2>
            <p style="color: #a2a8d3; margin-bottom: 20px;">請要競選警長的玩家舉手，並進行發言與投票。</p>
            <button id="btn-finish-sheriff" class="primary-btn">警長選舉結束，公布昨晚死訊</button>
        </div>

        <div id="screen-day" class="screen hidden">
            <h2>🌞 天亮了</h2>

            <div id="alchemist-call-section" class="hidden" style="margin-bottom: 20px;"></div>

            <div id="day-result-content">
                <p id="day-result" style="font-size: 24px; font-weight: bold; margin: 20px 0;"></p>
                <button id="btn-show-judge" class="text-btn" style="margin-bottom: 10px; border: 1px solid #4b5563;">📋 查看法官紀錄</button>

                <div id="day-skill-section" class="hidden" style="background-color: #24345e; border: 2px solid #fca311; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                    <p id="day-skill-notice" style="color: #fca311; font-size: 20px; font-weight: bold; margin: 0 0 15px 0;">🎯 【 X 號 】玩家，請問是否發動技能？</p>
                    <div id="day-skill-pad" class="grid-container"></div>
                    <button id="btn-day-skill-skip" class="text-btn" style="margin-top: 10px;">放棄發動技能</button>
                    <button id="btn-day-skill-confirm" class="primary-btn hidden" style="margin-top: 10px;">確認發動</button>
                </div>
                <button id="btn-reset" class="secondary-btn">重新開始新局</button>
            </div>
        </div>

        <div id="role-modal" class="modal hidden">
            <div class="modal-content">
                <h3 id="modal-seat-title">設定 X 號身分</h3>
                <div id="modal-role-options" class="role-options" style="max-height: 60vh; overflow-y: auto;"></div>
                <button id="btn-close-modal" class="text-btn" style="margin-top: 15px;">取消</button>
            </div>
        </div>

        <div id="lock-modal" class="modal hidden">
            <div class="modal-content">
                <h3>🔒 進入黑夜</h3>
                <p style="color: #00ff88; margin-bottom: 15px;">✅ 職業配置校驗成功！</p>
                <p style="color: #a2a8d3;">即將進入黑夜，請確認裝置已放回桌面中央。</p>
                <div style="display:flex; flex-direction: column; gap: 10px; margin-top: 20px;">
                    <button id="btn-confirm-lock" class="primary-btn">確認鎖定並進入黑夜</button>
                    <button id="btn-cancel-lock" class="secondary-btn">取消，再檢查一下</button>
                </div>
            </div>
        </div>

        <div id="judge-modal" class="modal hidden">
            <div class="modal-content" style="max-width: 500px; text-align: left;">
                <h3 style="margin-top:0;">📜 法官紀錄面板</h3>
                <div id="judge-player-status" style="max-height: 30vh; overflow-y: auto; margin-bottom: 10px; background: #24345e; padding: 10px; border-radius: 8px; font-size: 14px; line-height: 1.6;"></div>
                <h4 style="margin: 10px 0 5px 0;">🌙 夜晚操作紀錄</h4>
                <div id="judge-night-log" style="max-height: 25vh; overflow-y: auto; background: #24345e; padding: 10px; border-radius: 8px; color: #a2a8d3; font-size: 14px; line-height: 1.6;"></div>
                <button id="btn-close-judge" class="primary-btn" style="margin-top: 15px;">關閉</button>
            </div>
        </div>

    </div>
    <script type="module" src="js/main.js"></script>
</body>

</html>
